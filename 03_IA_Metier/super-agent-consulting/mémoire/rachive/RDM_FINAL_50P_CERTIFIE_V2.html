<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rapport de Mission - Julien Florence</title>
    <style>
        :root { --bg: #0F1115; --accent: #D4AF37; --text: #FFFFFF; }
        @media print { @page { size: A4; margin: 0; } body { background: var(--bg) !important; -webkit-print-color-adjust: exact; } .back-to-toc-icon { display: none !important; } }
        body { background: #000; color: var(--text); font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.5; margin: 0; }
        .page { width: 210mm; height: 297mm; background: var(--bg); margin: 20px auto; padding: 40mm 30mm; box-sizing: border-box; page-break-after: always; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .inner-border { position: absolute; top: 10mm; left: 10mm; right: 10mm; bottom: 10mm; border: 1px solid rgba(212, 175, 55, 0.2); pointer-events: none; }
        h1 { font-family: serif; color: var(--accent); text-align: center; border-bottom: 1px solid var(--accent); margin-bottom: 20px; }
        h2 { font-family: serif; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; margin: 20px 0; }
        .footer { margin-top: auto; border-top: 1px solid var(--accent); padding-top: 5mm; display: flex; justify-content: space-between; font-size: 8pt; color: var(--accent); }
        .back-to-toc-icon { position: absolute; bottom: 12mm; right: 15mm; width: 7mm; height: 7mm; border: 1px solid var(--accent); border-radius: 50%; color: var(--accent); text-decoration: none; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }
        .content p { text-align: justify; margin-bottom: 20px; }
    
        /* Centrage automatique pour les pages de titre seul */
        .page.title-only {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .page.title-only .footer {
            position: absolute;
            bottom: 10mm;
            left: 15mm;
            right: 15mm;
            margin-top: 0;
            width: auto;
        }
        .page.title-only h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }
        .page.title-only .content-wrapper {
            justify-content: center;
        }
    
        /* Fix Footer et Pagination pour rendu net */
        .footer { 
            position: absolute !important;
            bottom: 12mm !important;
            left: 20mm !important;
            right: 20mm !important;
            border-top: 1px solid rgba(212, 175, 55, 0.5) !important; 
            padding-top: 4mm !important; 
            display: flex !important; 
            justify-content: space-between !important; 
            font-family: 'Cinzel', serif !important; 
            font-size: 8pt !important; 
            color: var(--accent) !important;
            z-index: 100 !important;
            background: transparent !important;
            margin-top: 0 !important;
        }
        .page {
            padding-bottom: 30mm !important; /* Espace pour le footer */
        }
    
        /* Optimisation de l'espace vertical */
        .page {
            padding: 30mm 25mm 35mm 25mm !important; 
        }
        h1 { margin-top: 0 !important; margin-bottom: 20px !important; }
        h2 { margin-top: 20px !important; margin-bottom: 15px !important; }
        p { margin-bottom: 12px !important; }
    </style>
</head>
<body>
    <div class="page title-only" id="p1">
        <div class="inner-border"></div>
        <div style="text-align: center; margin-top: 50px;">
            <div style="font-family: serif; color: var(--accent); letter-spacing: 5px; font-size: 1.2rem;">Rocket School Toulouse</div>
            <h1 style="font-size: 3.5rem; margin: 40px 0; border: none;">RAPPORT DE MISSION<br>STRATÉGIQUE</h1>
            <div style="font-style: italic; color: var(--accent); font-size: 1.5rem; margin: 40px 0;">"Industrialiser le prestige : la métamorphose numérique d'un réseau d'exception."</div>
            <div style="font-size: 2rem; font-weight: 600; letter-spacing: 2px;">JULIEN FLORENCE</div>
            <div style="color: var(--accent); letter-spacing: 3px; font-size: 1rem; margin-top: 10px;">Directeur du Développement Opérationnel</div>
            <div style="margin-top: 100px; font-size: 1rem; letter-spacing: 2px;">Tuteur : Patrice Kermarrec</div>
            <div style="margin-top: 20px; font-size: 0.8rem; letter-spacing: 2px;">SESSION 2026 | HAPPY HOUSE</div>
        </div>
    </div>

</body>
</html>

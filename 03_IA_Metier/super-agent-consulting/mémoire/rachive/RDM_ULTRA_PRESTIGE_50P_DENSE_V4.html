<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rapport de Mission - Julien Florence - Happy House</title>
    <style>
        :root { --bg: #0F1115; --accent: #D4AF37; --text: #FFFFFF; --text-dim: rgba(255, 255, 255, 0.7); }
        @media print { @page { size: A4; margin: 0; } body { background: var(--bg) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { margin: 0 !important; border: none !important; box-shadow: none !important; } .back-to-toc-icon { display: none !important; } }
        body { background: #000; color: var(--text); font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.5; margin: 0; counter-reset: page; scroll-behavior: smooth; }
        .page { width: 210mm; height: 297mm; background: var(--bg); margin: 20px auto; padding: 45mm 35mm; box-sizing: border-box; page-break-after: always; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .inner-border { position: absolute; top: 10mm; left: 10mm; right: 10mm; bottom: 10mm; border: 1px solid rgba(212, 175, 55, 0.15); pointer-events: none; }
        h1 { font-family: serif; color: var(--accent); text-align: center; border-bottom: 1px solid var(--accent); margin-bottom: 25px; text-transform: uppercase; font-size: 1.6rem; }
        h2 { font-family: serif; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 15px; margin: 25px 0; font-size: 1.3rem; }
        p { text-align: justify; margin-bottom: 20px; color: var(--text-dim); }
        .footer { margin-top: auto; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 5mm; display: flex; justify-content: space-between; font-size: 8pt; color: var(--accent); }
        .page-num::after { counter-increment: page; content: "PAGE " counter(page, decimal-leading-zero); }
        .back-to-toc-icon { position: absolute; bottom: 12mm; right: 15mm; width: 7mm; height: 7mm; border: 1px solid var(--accent); border-radius: 50%; color: var(--accent); text-decoration: none; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); font-size: 12pt; z-index: 100; }
        a { color: inherit; text-decoration: none; }
    
        /* Centrage automatique pour les pages de titre seul */
        .page.title-only {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .page.title-only .footer {
            position: absolute;
            bottom: 10mm;
            left: 15mm;
            right: 15mm;
            margin-top: 0;
            width: auto;
        }
        .page.title-only h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }
        .page.title-only .content-wrapper {
            justify-content: center;
        }
    
        /* Fix Footer et Pagination pour rendu net */
        .footer { 
            position: absolute !important;
            bottom: 12mm !important;
            left: 20mm !important;
            right: 20mm !important;
            border-top: 1px solid rgba(212, 175, 55, 0.5) !important; 
            padding-top: 4mm !important; 
            display: flex !important; 
            justify-content: space-between !important; 
            font-family: 'Cinzel', serif !important; 
            font-size: 8pt !important; 
            color: var(--accent) !important;
            z-index: 100 !important;
            background: transparent !important;
            margin-top: 0 !important;
        }
        .page {
            padding-bottom: 30mm !important; /* Espace pour le footer */
        }
    
        /* Optimisation de l'espace vertical */
        .page {
            padding: 30mm 25mm 35mm 25mm !important; 
        }
        h1 { margin-top: 0 !important; margin-bottom: 20px !important; }
        h2 { margin-top: 20px !important; margin-bottom: 15px !important; }
        p { margin-bottom: 12px !important; }
    </style>
</head>
<body>

</body>
</html>

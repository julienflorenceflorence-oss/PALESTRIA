<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartes Prestige avec Photo - Julien FLORENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
            --onyx: #0A0A0A;
            --bordeaux: #630D16;
            --bleu-nuit: #0A192F;
        }

        body { 
            background: #111; 
            color: var(--gold); 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0;
        }

        h1 { 
            font-family: 'Cinzel', serif;
            letter-spacing: 6px; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            font-size: 2rem;
            color: var(--white);
        }

        .description {
            color: var(--white);
            opacity: 0.6;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .card { 
            border: 2px solid var(--gold); 
            border-radius: 24px; 
            padding: 30px; 
            width: 320px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .card-duo { background: var(--onyx); }
        .card-cercle { background: var(--bordeaux); }
        .card-happy { background: var(--bleu-nuit); }

        .profile-pic-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
            overflow: hidden;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin: 0 0 5px 0;
            color: var(--white);
            text-transform: uppercase;
        }

        .card .subtitle {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 20px;
            color: var(--gold);
            font-weight: 600;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-box { 
            background: white; 
            padding: 12px; 
            border-radius: 16px; 
            display: inline-block; 
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 180px;
            height: 180px;
        }

        .qr-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn { 
            display: inline-block; 
            background: var(--gold); 
            color: #000; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            cursor: pointer; 
            border: none;
            font-size: 0.7rem;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .info-footer { 
            color: var(--white); 
            opacity: 0.4; 
            font-size: 0.6rem; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <h1>Édition Prestige Photo</h1>
    <p class="description">Vos cartes avec photo visuelle et intégration Google Drive.</p>

    <div class="cards-container">
        
        <!-- SECTION DUO PROFIL -->
        <div class="card-wrapper">
            <div class="card card-duo" id="card-duo">
                <div class="profile-pic-container">
                    <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Julien FLORENCE">
                </div>
                <h2>Duo Profil</h2>
                <div class="subtitle">Julien FLORENCE</div>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F14xYJ0HaVBWLJAOQRw65MaQ5Ntd_DNHI-%2Fview%3Fusp%3Dsharing" alt="QR Duo">
                </div>
                <div class="info-footer">Cercle Origine & Happy House</div>
            </div>
            <button class="btn" onclick="downloadJPG('card-duo', 'Carte_Duo_Photo')">Télécharger (JPG)</button>
        </div>

        <!-- SECTION CERCLE ORIGINE -->
        <div class="card-wrapper">
            <div class="card card-cercle" id="card-cercle">
                <div class="profile-pic-container">
                    <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Julien FLORENCE">
                </div>
                <h2>Cercle Origine</h2>
                <div class="subtitle">Co-fondateur & Président</div>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1oH4EluvEAl7X3H75cUgrJbMFrglk0jT9%2Fview%3Fusp%3Dsharing" alt="QR Cercle">
                </div>
                <div class="info-footer">Cercle Origine</div>
            </div>
            <button class="btn" onclick="downloadJPG('card-cercle', 'Carte_Cercle_Photo')">Télécharger (JPG)</button>
        </div>

        <!-- SECTION HAPPY HOUSE -->
        <div class="card-wrapper">
            <div class="card card-happy" id="card-happy">
                <div class="profile-pic-container">
                    <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Julien FLORENCE">
                </div>
                <h2>Happy House</h2>
                <div class="subtitle">Directeur du Dév. Commercial</div>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1mbhNmZL4V0gYxsPox0cUtJSnjQz3RNoy%2Fview%3Fusp%3Dsharing" alt="QR Happy">
                </div>
                <div class="info-footer">Happy House</div>
            </div>
            <button class="btn" onclick="downloadJPG('card-happy', 'Carte_Happy_Photo')">Télécharger (JPG)</button>
        </div>

    </div>

<script>
    function downloadJPG(elementId, fileName) {
        const element = document.getElementById(elementId);
        html2canvas(element, { 
            scale: 2, 
            useCORS: true,
            backgroundColor: null 
        }).then(canvas => {
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = fileName + '.jpg';
            link.href = imgData;
            link.click();
        }).catch(err => {
            alert("Erreur : Assurez-vous d'être connecté à internet pour charger la photo.");
        });
    }
</script>

</body>
</html>

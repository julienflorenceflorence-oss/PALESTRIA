<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planche Cartes Prestige Photo - Julien FLORENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
            --onyx: #0A0A0A;
            --bordeaux: #630D16;
            --bleu-nuit: #0A192F;
        }

        body { 
            background: #111; 
            color: var(--gold); 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0;
        }

        h1 { 
            font-family: 'Cinzel', serif;
            letter-spacing: 6px; 
            text-transform: uppercase; 
            margin-bottom: 40px;
            font-size: 2rem;
            color: var(--white);
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            border: 2px solid var(--gold); 
            border-radius: 24px; 
            padding: 30px; 
            width: 320px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card-duo { background: var(--onyx); }
        .card-cercle { background: var(--bordeaux); }
        .card-happy { background: var(--bleu-nuit); }

        .profile-pic-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
            overflow: hidden;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin: 0 0 5px 0;
            color: var(--white);
            text-transform: uppercase;
        }

        .card .subtitle {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 20px;
            color: var(--gold);
            font-weight: 600;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-box { 
            background: white; 
            padding: 12px; 
            border-radius: 16px; 
            display: inline-block; 
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 180px;
            height: 180px;
        }

        .qr-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn { 
            display: inline-block; 
            background: var(--gold); 
            color: #000; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            cursor: pointer; 
            border: none;
            font-size: 0.7rem;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover { filter: brightness(1.1); }

        .info-footer { 
            color: var(--white); 
            opacity: 0.4; 
            font-size: 0.6rem; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media print {
            body { background: white; }
            .btn, h1 { display: none; }
            .cards-container { display: block; }
            .card { border: 1px solid #ddd; background: white !important; color: black !important; box-shadow: none; margin: 20px auto; width: 300px; }
            .card h2, .card .subtitle { color: black !important; }
            .qr-box { border: 1px solid #eee; }
        }
    </style>
</head>
<body>

    <h1>Vos Cartes Prestige avec Photo</h1>

    <div class="cards-container">
        
        <!-- SECTION DUO PROFIL -->
        <div class="card card-duo">
            <div class="profile-pic-container">
                <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Julien FLORENCE">
            </div>
            <h2>Duo Profil</h2>
            <div class="subtitle">Julien FLORENCE</div>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F14xYJ0HaVBWLJAOQRw65MaQ5Ntd_DNHI-%2Fview%3Fusp%3Ddrive_link" alt="QR Duo">
            </div>
            <button class="btn" onclick="window.print()">Imprimer la carte</button>
            <p class="info-footer">Cercle Origine & Happy House</p>
        </div>

        <!-- SECTION CERCLE ORIGINE -->
        <div class="card card-cercle">
            <div class="profile-pic-container">
                <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Julien FLORENCE">
            </div>
            <h2>Cercle Origine</h2>
            <div class="subtitle">Co-fondateur & Président</div>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1oH4EluvEAl7X3H75cUgrJbMFrglk0jT9%2Fview%3Fusp%3Ddrive_link" alt="QR Cercle">
            </div>
            <button class="btn" onclick="window.print()">Imprimer la carte</button>
            <p class="info-footer">Intelligence Viticole et Hôtelière</p>
        </div>

        <!-- SECTION HAPPY HOUSE -->
        <div class="card card-happy">
            <div class="profile-pic-container">
                <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Julien FLORENCE">
            </div>
            <h2>Happy House</h2>
            <div class="subtitle">Directeur du Dév. Commercial</div>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1mbhNmZL4V0gYxsPox0cUtJSnjQz3RNoy%2Fview%3Fusp%3Ddrive_link" alt="QR Happy">
            </div>
            <button class="btn" onclick="window.print()">Imprimer la carte</button>
            <p class="info-footer">Stratégie Réseau & Développement</p>
        </div>

    </div>

</body>
</html>

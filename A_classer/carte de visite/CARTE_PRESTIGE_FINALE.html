<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Carte Prestige - Julien FLORENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx: #0A0A0A;
            --gold: #D4AF37;
            --white: #FFFFFF;
            --gray: #1C1C1C;
        }

        body { 
            background: #111; 
            color: var(--gold); 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            background: var(--onyx); 
            border: 2px solid var(--gold); 
            border-radius: 32px; 
            padding: 40px; 
            display: inline-block; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            max-width: 380px;
            width: 90%;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 20px;
            object-fit: cover;
            background: #222;
        }

        h1 { 
            font-family: 'Cinzel', serif;
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: var(--white);
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .qr-box { 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            display: inline-block; 
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .qr-box img {
            width: 250px;
            height: 250px;
            display: block;
        }

        .btn { 
            display: inline-block; 
            background: var(--gold); 
            color: var(--onyx); 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            cursor: pointer; 
            border: none;
            width: 100%;
            font-size: 0.8rem;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.7rem;
            opacity: 0.5;
            color: var(--white);
        }

        @media print {
            body { background: white; }
            .container { border: 1px solid #ddd; box-shadow: none; background: white !important; }
            .btn { display: none; }
            h1, .subtitle { color: black !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Photo de profil directe depuis Google Drive -->
    <img class="profile-pic" src="https://drive.google.com/uc?id=1-2scDsIBJ4K0SOkOBxxASG08seHRu3am" alt="Photo de Julien Florence">
    
    <h1>Julien FLORENCE</h1>
    <div class="subtitle">Contact Prestige</div>
    
    <div class="qr-box">
        <!-- QR Code pointant vers le lien Drive exact qui affichait le logo -->
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1PQGF6w5-r9yCdxP5axrsmD8YfYI5B-BT%2Fview%3Fusp%3Dsharing" alt="QR Code">
    </div>

    <button class="btn" onclick="window.print()">Imprimer ma carte</button>
    
    <div class="footer-text">Scannez pour ouvrir avec Google Drive</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Contacts Prestige - Julien FLORENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx: #0A0A0A;
            --gold: #D4AF37;
            --white: #FFFFFF;
            --gray: #1C1C1C;
            --bordeaux: #630D16;
            --bleu: #0A192F;
        }

        body { 
            background: var(--onyx); 
            color: var(--gold); 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--gray);
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }

        .contact-option {
            background: #000;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .contact-info h3 { margin: 0; color: var(--gold); font-family: 'Cinzel', serif; font-size: 1rem; }
        .contact-info p { margin: 5px 0 0; color: #888; font-size: 0.8rem; }

        .btn { 
            background: var(--gold); 
            color: var(--onyx); 
            padding: 10px 20px; 
            border-radius: 6px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            border: none;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .btn:hover { filter: brightness(1.1); transform: scale(1.05); }

        .btn-bordeaux { background: var(--bordeaux); color: white; }
        .btn-bleu { background: var(--bleu); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Générateur de Fiches Contact</h1>
        <p style="color: white; opacity: 0.7; margin-bottom: 30px;">Téléchargez vos 3 fiches séparées pour vos 3 cartes de visite.</p>
        
        <!-- OPTION 1 : DUO -->
        <div class="contact-option">
            <div class="contact-info">
                <h3>Contact DUO (Complet)</h3>
                <p>Cercle Origine + Happy House + Photo + LinkedIn</p>
            </div>
            <button class="btn" onclick="downloadVCard('duo')">Télécharger</button>
        </div>

        <!-- OPTION 2 : CERCLE ORIGINE -->
        <div class="contact-option">
            <div class="contact-info">
                <h3>Contact CERCLE ORIGINE</h3>
                <p>Président & Co-fondateur uniquement</p>
            </div>
            <button class="btn btn-bordeaux" onclick="downloadVCard('cercle')">Télécharger</button>
        </div>

        <!-- OPTION 3 : HAPPY HOUSE -->
        <div class="contact-option">
            <div class="contact-info">
                <h3>Contact HAPPY HOUSE</h3>
                <p>Directeur du Développement uniquement</p>
            </div>
            <button class="btn btn-bleu" onclick="downloadVCard('happy')">Télécharger</button>
        </div>
    </div>

    function downloadVCard(type) {
        let vcard = "";
        const commonStart = [
            "BEGIN:VCARD",
            "VERSION:3.0",
            "FN:Julien FLORENCE",
            "N:FLORENCE;Julien;;;",
            "TEL;TYPE=CELL,VOICE:0661747573",
            "EMAIL;TYPE=PREF,INTERNET:julienflorence.florence@gmail.com",
            "URL;TYPE=LinkedIn:https://www.linkedin.com/in/julien-florence-2536a083/",
            "PHOTO;ENCODING=b;TYPE=JPEG:" + photoBase64
        ];

        if (type === 'duo') {
            vcard = [
                ...commonStart,
                "ORG:CERCLE ORIGINE / Happy House",
                "TITLE:Président & Dir. Dév. Commercial",
                "URL;TYPE=WORK:https://www.my-happy.house/",
                "NOTE:Co-fondateur & Président de CERCLE ORIGINE / Directeur du développement commercial chez Happy House.",
                "END:VCARD"
            ].join("\n");
        } else if (type === 'cercle') {
            vcard = [
                ...commonStart,
                "ORG:CERCLE ORIGINE",
                "TITLE:Co-fondateur & Président",
                "NOTE:CERCLE ORIGINE - Intelligence Hôtelière.",
                "END:VCARD"
            ].join("\n");
        } else if (type === 'happy') {
            vcard = [
                ...commonStart,
                "ORG:Happy House",
                "TITLE:Directeur du développement commercial",
                "URL;TYPE=WORK:https://www.my-happy.house/",
                "NOTE:Happy House - Stratégie Réseau & Développement.",
                "END:VCARD"
            ].join("\n");
        }

        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Julien_FLORENCE_${type.toUpperCase()}.vcf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

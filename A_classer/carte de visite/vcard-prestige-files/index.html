<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Julien FLORENCE - CERCLE ORIGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx: #0A0A0A;
            --gold: #D4AF37;
            --bordeaux: #630D16;
            --gray: #1C1C1C;
            --white: #F2F2F2;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--onyx);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .card {
            width: 90%; max-width: 380px;
            background: linear-gradient(145deg, var(--gray), #050505);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 24px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .profile-container {
            position: relative;
            width: 140px; height: 140px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
            filter: grayscale(20%);
        }

        .status-dot {
            position: absolute; bottom: 10px; right: 10px;
            width: 15px; height: 15px;
            background: #27ae60; border: 3px solid var(--onyx);
            border-radius: 50%;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin: 10px 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 4px;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .actions {
            display: flex; flex-direction: column; gap: 12px;
        }

        .btn-main {
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: var(--onyx);
            text-decoration: none;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
            filter: brightness(1.1);
        }

        .btn-sub {
            padding: 15px;
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-sub:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--gold);
        }

        .bio {
            font-size: 0.85rem;
            opacity: 0.6;
            line-height: 1.6;
            margin: 25px 0;
            font-weight: 300;
        }

        .ai-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px; border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px; font-size: 0.6rem; color: var(--gold);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .pulse {
            width: 6px; height: 6px; background: var(--gold);
            border-radius: 50%; animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .footer-logo {
            margin-top: 40px; opacity: 0.3; font-family: 'Cinzel', serif;
            font-size: 0.7rem; letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="ai-badge">
        <div class="pulse"></div>
        Intelligence Hôtelière
    </div>

    <div class="profile-container">
        <img id="p-img" src="" class="profile-img">
        <div class="status-dot"></div>
    </div>

    <h1 id="p-name">Chargement...</h1>
    <div class="role" id="p-role">---</div>
    
    <div class="actions">
        <button class="btn-main" onclick="downloadVCard()">Ajouter aux contacts</button>
        <a id="p-web" href="#" class="btn-sub" target="_blank">Visiter le Site Web</a>
        <a id="p-linkedin" href="#" class="btn-sub" target="_blank">Profil LinkedIn</a>
    </div>
    
    <div id="p-bio" class="bio"></div>

    <div class="footer-logo">CERCLE ORIGINE</div>
</div>

<script>
    // Injection des données
    const config = <?!= JSON.stringify(getCardData()) ?>;

    if (config.error) {
        document.getElementById('p-name').innerText = "Erreur de configuration";
        document.getElementById('p-role').innerText = config.error;
        console.error("Erreur Apps Script:", config.error);
    } else {
        document.getElementById('p-name').innerText = config.Nom || 'Julien FLORENCE';
        document.getElementById('p-role').innerText = config.Poste || 'Directeur';
        document.getElementById('p-bio').innerText = config.Bio || '';
        document.getElementById('p-img').src = config.Photo_URL || 'https://via.placeholder.com/150';
        document.getElementById('p-web').href = config.Site_Web || '#';
        document.getElementById('p-linkedin').href = config.LinkedIn || '#';

        // Tracking à l'ouverture (silencieux)
        fetch(window.location.href, {
            method: 'POST',
            body: JSON.stringify({ userAgent: navigator.userAgent, action: 'Ouverture' })
        }).catch(err => console.error("Tracking error:", err));
    }

    function downloadVCard() {
        if (config.error) {
            alert("Impossible de générer le contact : erreur de configuration.");
            return;
        }

        const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${config.Nom || ''}
ORG:${config.Entreprise || ''}
TITLE:${config.Poste || ''}
TEL;TYPE=CELL:${config.Mobile || ''}
EMAIL:${config.Email || ''}
URL:${config.Site_Web || ''}
X-SOCIALMSGR;TYPE=linkedin:${config.LinkedIn || ''}
END:VCARD`;

        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Contact_${(config.Nom || 'Julien').replace(/\s+/g, '_')}.vcf`;
        a.click();
        
        // Tracking du clic
        fetch(window.location.href, {
            method: 'POST',
            body: JSON.stringify({ userAgent: navigator.userAgent, action: 'Ajout Contact' })
        }).catch(err => console.error("Tracking error:", err));
    }
</script>

</body>
</html>

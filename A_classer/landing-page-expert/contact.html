    <style>
        .contact-card { 
            background: rgba(22, 26, 35, 0.8); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 60px 40px; 
            text-align: center; 
            max-width: 900px; 
            margin: 0 auto; 
            border-radius: 5px; 
            backdrop-filter: blur(10px);
        }
        
        .contact-methods { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Force 2 colonnes pour faire un carré */
            gap: 30px; 
            margin-top: 50px; 
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .contact-item { 
            text-decoration: none; 
            padding: 40px 20px; 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            border-radius: 5px; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px; 
            color: var(--text-light); 
            aspect-ratio: 1 / 0.8; /* Assure une forme proche du carré pour chaque carte */
        }

        .contact-item:hover { 
            border-color: var(--primary-gold); 
            transform: translateY(-10px); 
            box-shadow: 0 15px 40px var(--gold-glow); 
            background: rgba(212, 175, 55, 0.05);
        }

        .contact-item .icon { 
            width: 50px; 
            height: 50px; 
            color: var(--primary-gold); 
            filter: drop-shadow(0 0 8px var(--gold-glow)); 
            transition: transform 0.3s;
        }

        .contact-item:hover .icon {
            transform: scale(1.15);
        }

        .contact-item .label { 
            font-family: 'Cinzel', serif; 
            font-size: 0.8rem; 
            color: var(--primary-gold); 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }

        .contact-item .value { 
            font-size: 0.9rem; 
            color: var(--text-dim);
            font-weight: 300;
        }

        .highlight-action { 
            background: linear-gradient(135deg, #F7EF8A 0%, #D4AF37 50%, #8A6426 100%) !important; 
        }

        .highlight-action * { color: #000 !important; }
        .highlight-action .icon { filter: none !important; }

        @media (max-width: 600px) {
            .contact-methods { 
                grid-template-columns: 1fr; /* Repasse en 1 colonne sur petit mobile */
            }
            .contact-item { aspect-ratio: auto; }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>CV Julien FLORENCE - Manager Commercial & Opérationnel - Édition Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090E;
            --primary-gold: #D4AF37;
            --text-light: #f4f4f4;
            --text-dim: #C0C0C0;
            --sidebar-bg: rgba(18, 24, 38, 0.65);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #07090E;
            color: var(--text-light);
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* BLOCAGE PAYSAGE UNIQUEMENT POUR APPAREILS MOBILES/TABLETTES (< 13") */
        /* On cible les appareils sans capacité de survol (hover: none) pour épargner les laptops */
        @media screen and (orientation: landscape) and (max-width: 1366px) and (hover: none) {
            body::before {
                content: "Lecture horizontale interdite sur cet appareil. \A Veuillez pivoter votre appareil en mode Portrait pour consulter ce dossier de prestige.";
                white-space: pre-wrap; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: var(--bg-color); color: var(--primary-gold);
                display: flex; align-items: center; justify-content: center;
                text-align: center; padding: 30px; font-family: 'Cinzel', serif;
                z-index: 99999; font-size: 1.2rem; line-height: 1.5;
            }
            .cv-page, .footer-dock { display: none !important; }
        }

        .cv-page {
            width: 100%;
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            background: linear-gradient(135deg, rgba(18, 24, 38, 0.5), rgba(7, 9, 14, 0.9));
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            position: relative;
            box-shadow: 0 40px 90px rgba(0,0,0,0.6);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 12px;
            overflow: hidden;
            z-index: 2;
        }

        aside {
            width: 35%;
            background-color: var(--sidebar-bg);
            padding: 40px 25px;
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 2;
            display: flex;
            flex-direction: column;
        }

        .profile-img-container {
            width: 100%;
            margin-bottom: 30px;
            border: 2px solid var(--primary-gold);
            padding: 4px;
            border-radius: 10px;
            overflow: hidden;
        }

        .profile-img-container img { width: 100%; display: block; filter: brightness(1.05); border-radius: 6px; }

        h2 { 
            font-family: 'Cinzel', serif; 
            font-size: 0.95rem; 
            color: var(--primary-gold); 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--primary-gold); 
            padding-bottom: 5px; 
            margin: 25px 0 15px 0; 
            letter-spacing: 2px;
        }

        .sidebar-section { margin-bottom: 20px; }
        .info-item { 
            font-size: 0.85rem; 
            margin-bottom: 8px; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
        }
        .info-item strong { color: var(--text-light); margin-right: 5px; }
        .info-item img { margin-right: 10px; flex-shrink: 0; }

        main { width: 65%; padding: 40px 50px; z-index: 2; position: relative; display: flex; flex-direction: column; }
        
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--primary-gold); letter-spacing: 3px; margin-bottom: 5px; }
        .job-title { font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; font-size: 1.1rem; opacity: 0.9; }
        
        .who-title { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--primary-gold); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .summary { font-size: 1rem; color: var(--text-dim); text-align: justify; margin-bottom: 40px; padding: 25px; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 10px; background: linear-gradient(135deg, rgba(197, 160, 89, 0.04), rgba(18, 24, 38, 0.3)); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .quote { font-style: italic; color: var(--primary-gold); margin-top: 15px; display: block; font-size: 0.9rem; text-align: right; opacity: 0.8; }
        
        .section-header { font-family: 'Cinzel', serif; font-size: 1.15rem; color: var(--primary-gold); margin: 40px 0 25px 0; display: flex; align-items: center; letter-spacing: 2px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--primary-gold), transparent); margin-left: 20px; }

        .exp-item { 
            margin-bottom: 25px; 
            padding: 25px; 
            border: 1px solid rgba(197, 160, 89, 0.12); 
            border-radius: 10px; 
            transition: all 0.4s ease;
            background: linear-gradient(135deg, rgba(197, 160, 89, 0.02), rgba(18, 24, 38, 0.25));
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        .exp-item:hover { border-color: var(--primary-gold); transform: translateX(5px); background: rgba(197, 160, 89, 0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .exp-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .exp-role { font-weight: 700; font-size: 1.05rem; color: var(--primary-gold); font-family: 'Cinzel', serif; }
        .exp-date { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); font-family: 'Cinzel', serif; white-space: nowrap; letter-spacing: 1px; }

        </div>
    </div>
</body>

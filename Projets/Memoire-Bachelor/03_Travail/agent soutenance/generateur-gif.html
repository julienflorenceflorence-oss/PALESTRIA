<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Master Studio v8.2 | Édition Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        :root {
            --primary: #D4AF37;
            --gold: #D4AF37;
            --bg: #0F1115;
            --sidebar-bg: #08090C;
            --panel-bg: rgba(22, 26, 35, 0.98);
            --text: #f4f4f4;
            --border: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 70px;
            background: var(--sidebar-bg);
            border-right: 1px solid #1a1d23;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            z-index: 100;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .app-header {
            padding: 30px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .app-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 2.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .app-header .v-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
            padding-top: 10px;
        }

        .studio-container {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 50px;
            padding: 20px 60px 60px 60px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Form Panel */
        .form-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-title i { font-size: 1.2rem; }

        .input-group { margin-bottom: 30px; }
        .input-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 0.65rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        input[type="file"] {
            background: #000;
            border: 1px solid #222;
            padding: 10px;
            color: #fff;
            width: 100%;
            cursor: pointer;
            font-family: 'Montserrat';
        }

        input[type="number"], select, textarea {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            font-family: 'Montserrat';
            font-size: 0.95rem;
            border-radius: 4px;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            outline: none;
        }

        /* Preview Panel */
        .preview-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .gif-preview-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .gif-preview-box video, .gif-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caption-overlay {
            position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; font-size: 1.1rem; color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,1); letter-spacing: 2px; z-index: 5;
            pointer-events: none;
        }

        .placeholder-text {
            color: #333;
            font-family: 'Montserrat';
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-prestige {
            width: 100%;
            padding: 22px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn-prestige:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn-prestige:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .btn-download {
            background: #fff;
            text-decoration: none;
            text-align: center;
            display: none;
        }

        /* Progress Bar */
        #progress-container {
            width: 100%;
            height: 4px;
            background: #111;
            position: relative;
            margin-top: -10px;
            display: none;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--gold);
            transition: width 0.1s;
            box-shadow: 0 0 10px var(--gold);
        }

        #status-text {
            text-align: center;
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-icon active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </div>
    <div class="sidebar-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
    </div>
    <div class="sidebar-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>
    
    <div class="sidebar-bottom">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </div>
        <div class="sidebar-icon">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </div>
    </div>
</nav>

<div class="main-content">
    <header class="app-header">
        <h1>GIF Studio</h1>
        <span class="v-tag">V8.2 PRESTIGE</span>
    </header>

    <div class="studio-container">
        <div class="form-panel">
            <div class="section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                Source
            </div>
            
            <div class="input-group">
                <label>Vidéo (MP4)</label>
                <input type="file" id="local_video" accept="video/mp4">
            </div>

            <div class="section-title" style="margin-top: 40px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                Typographie
            </div>
            <div class="input-group">
                <label>Signature Cinématique</label>
                <textarea id="gif_caption" placeholder="Ex: LUXE & STRATÉGIE 2026"></textarea>
            </div>

            <div class="section-title" style="margin-top: 40px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Paramètres
            </div>

            <div class="input-group">
                <label>Format</label>
                <select id="gif_format">
                    <option value="square">Carré (1:1) - Signature</option>
                    <option value="hd">HD (16:9) - Standard</option>
                </select>
            </div>

            <div class="input-group">
                <label>Durée (sec)</label>
                <input type="number" id="capture_duration" value="2.0" min="0.5" max="5" step="0.1">
            </div>

            <div class="input-group">
                <label>Qualité (1-20)</label>
                <input type="number" id="gif_quality" value="10" min="1" max="20">
            </div>
        </div>

        <div class="preview-panel">
            <div class="gif-preview-box" id="media_container">
                <p class="placeholder-text">Sélectionnez une vidéo...</p>
                <div class="caption-overlay" id="caption_preview"></div>
            </div>
            
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="status-text">Moteur Prêt</div>

            <div class="action-btns">
                <button id="generate_btn" class="btn-prestige" onclick="generateGIF()">Générer le Master GIF</button>
                <a id="download_btn" class="btn-prestige btn-download" download="prestige_animation.gif">Télécharger le Master</a>
            </div>
        </div>
    </div>
</div>

<canvas id="capture_canvas" style="display:none;"></canvas>

<script>
    let videoUrl = "";

    document.getElementById('local_video').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            videoUrl = URL.createObjectURL(file);
            document.getElementById('media_container').innerHTML = `<video id="preview_video" src="${videoUrl}" autoplay loop muted playsinline></video><div class="caption-overlay" id="caption_preview">${document.getElementById('gif_caption').value}</div>`;
            document.getElementById('status-text').innerText = "Média chargé avec succès";
        }
    });

    document.getElementById('gif_caption').addEventListener('input', (e) => {
        const preview = document.getElementById('caption_preview');
        if (preview) preview.innerText = e.target.value;
    });

    async function generateGIF() {
        const video = document.getElementById('preview_video');
        if (!video) return;

        const btn = document.getElementById('generate_btn');
        const status = document.getElementById('status-text');
        const progress = document.getElementById('progress-bar');
        const progCont = document.getElementById('progress-container');
        const downloadBtn = document.getElementById('download_btn');

        btn.disabled = true;
        downloadBtn.style.display = 'none';
        progCont.style.display = 'block';
        status.innerText = "Phase 1 : Capture des trames HD...";

        const duration = parseFloat(document.getElementById('capture_duration').value);
        const quality = parseInt(document.getElementById('gif_quality').value);
        const format = document.getElementById('gif_format').value;
        const caption = document.getElementById('gif_caption').value;
        
        const fps = 15;
        const frameCount = Math.floor(duration * fps);
        const width = (format === 'square') ? 400 : 640;
        const height = (format === 'square') ? 400 : 360;

        const gif = new GIF({
            workers: 4,
            quality: quality,
            width: width,
            height: height,
            workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
        });

        const canvas = document.getElementById('capture_canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = width;
        canvas.height = height;

        video.pause();
        video.currentTime = 0;
        
        await new Promise(r => setTimeout(r, 500));

        for (let i = 0; i < frameCount; i++) {
            if (format === 'square') {
                const minDim = Math.min(video.videoWidth, video.videoHeight);
                const sx = (video.videoWidth - minDim) / 2;
                const sy = (video.videoHeight - minDim) / 2;
                ctx.drawImage(video, sx, sy, minDim, minDim, 0, 0, width, height);
            } else {
                ctx.drawImage(video, 0, 0, width, height);
            }

            if (caption) {
                const fontSize = Math.round(height / 18);
                ctx.font = `bold ${fontSize}px Cinzel`; 
                ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 10;
                ctx.fillText(caption, width/2, height * 0.92);
            }

            gif.addFrame(ctx, {copy: true, delay: 1000 / fps});
            video.currentTime += (1 / fps);
            
            const p = Math.round((i / frameCount) * 40);
            progress.style.width = p + "%";
            status.innerText = `Capture : ${p}%`;
            
            await new Promise(r => setTimeout(r, 30));
        }

        status.innerText = "Phase 2 : Encodage Multi-Cœur...";

        gif.on('progress', p => {
            const val = 40 + Math.round(p * 60);
            progress.style.width = val + "%";
            status.innerText = `Encodage : ${val}%`;
        });

        gif.on('finished', blob => {
            const url = URL.createObjectURL(blob);
            downloadBtn.href = url;
            downloadBtn.style.display = 'block';
            
            const img = document.createElement('img');
            img.src = url;
            document.getElementById('media_container').innerHTML = '';
            document.getElementById('media_container').appendChild(img);
            
            btn.disabled = false;
            status.innerText = "✓ Master GIF généré avec succès";
            progress.style.width = "100%";
            setTimeout(() => { progCont.style.display = 'none'; }, 2000);
        });

        gif.render();
    }
</script>
</body>
</html>

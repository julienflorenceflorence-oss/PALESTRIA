<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature QuestIA | Julien FLORENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --questia-bg: #05070D;
            --questia-accent: #00E5FF;
            --questia-purple: #7B5CFF;
            --questia-coral: #FF5A6A;
            --questia-text: #EEF1F7;
            --questia-muted: #8A93A8;
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background: var(--questia-bg);
            color: var(--questia-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-weight: 800;
            color: var(--questia-accent);
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .preview-box {
            background: #000;
            padding: 0;
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            display: inline-block;
        }

        .btn-copy {
            background: linear-gradient(90deg, var(--questia-accent), var(--questia-purple));
            color: #05070D;
            border: none;
            padding: 20px 40px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
        }

        .btn-copy:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.4);
        }

        #status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--questia-accent);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            height: 20px;
        }

        .instructions {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--questia-muted);
            line-height: 1.6;
            text-align: left;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-left: 2px solid var(--questia-accent);
            border-radius: 0 8px 8px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Signature QuestIA — Co-fondateur & Directeur Commercial</h1>

    <div class="preview-box" id="signature-container">
        <!-- La signature sera injectée ici -->
    </div>

    <button class="btn-copy" onclick="copySignature()">Copier pour Gmail</button>
    <div id="status"></div>

    <div class="instructions">
        <strong>Mode d'emploi :</strong><br>
        1. Cliquez sur le bouton "Copier pour Gmail".<br>
        2. Allez dans vos <strong>Paramètres Gmail</strong> > "Signature".<br>
        3. <strong>Collez</strong> (Ctrl+V) dans la zone de texte.<br>
        4. Enregistrez les modifications.
    </div>
</div>

<script>
    const signatureHTML = `
<table cellpadding="0" cellspacing="0" border="0" width="650" style="background-color: #05070D; width: 650px; font-family: 'Bricolage Grotesque', Arial, sans-serif; border: 1px solid rgba(0, 229, 255, 0.2); border-collapse: collapse;">
    <!-- 1. BANNIÈRE QUESTIA (HAUT) -->
    <tr>
        <td align="center" style="padding: 30px 0; background-color: #000; width: 650px;">
            <img src="https://raw.githubusercontent.com/julienflorenceflorence-oss/questia-signature/master/logo-questia.png" width="180" style="display: block; width: 180px; height: auto; border: 0;" alt="QuestIA Logo">
        </td>
    </tr>
    <!-- BARRE DE DÉGRADÉ QUESTIA -->
    <tr>
        <td style="padding: 0; line-height: 0; background: linear-gradient(90deg, #00E5FF, #7B5CFF, #FF5A6A); height: 4px; width: 650px;">
            &nbsp;
        </td>
    </tr>
    
    <!-- 2. ZONE DE TEXTE (CORPS DU MAIL - BLANC) -->
    <tr>
        <td style="background-color: #ffffff; padding: 50px 40px; color: #05070D; font-size: 16px; line-height: 1.6;">
            Bonjour,<br><br>
            [Tapez votre message ici...]<br><br><br>
        </td>
    </tr>

    <!-- LIGNE D'ACCENT BASSE -->
    <tr><td height="1" style="background-color: rgba(0, 229, 255, 0.1); line-height: 1px; font-size: 1px;">&nbsp;</td></tr>

    <!-- 3. PIED DE SIGNATURE (COORDONNÉES - BAS) -->
    <tr>
        <td style="padding: 35px 30px; background-color: #05070D;">
            <table cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <!-- PHOTO -->
                    <td width="110" align="center" style="vertical-align: top;">
                        <div style="width: 90px; height: 90px; border: 2px solid #00E5FF; border-radius: 50%; overflow: hidden; background-color: #0A0E18;">
                            <img src="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/photo/photo%20moi%20pro.jpeg" alt="Julien FLORENCE" width="90" style="display: block;">
                        </div>
                    </td>

                    <td style="padding-left: 30px; vertical-align: middle;">
                        <!-- NOM -->
                        <div style="color: #00E5FF; font-size: 24px; font-weight: 800; letter-spacing: -0.02em; font-family: 'Bricolage Grotesque', sans-serif;">Julien FLORENCE</div>
                        
                        <!-- POSTE -->
                        <div style="color: #EEF1F7; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; opacity: 0.9;">Co-fondateur & Directeur Commercial</div>
                        <div style="color: #8A93A8; font-size: 12px; font-weight: 400; letter-spacing: 0.5px; margin-top: 2px;">QuestIA — Simulation IA Immersive B2B</div>
                        
                        <!-- CONTACTS -->
                        <table cellpadding="0" cellspacing="0" border="0" style="margin-top: 20px;">
                            <tr>
                                <td style="vertical-align: middle;">
                                    <img src="https://img.icons8.com/ios-filled/50/00E5FF/phone.png" width="12" style="display: block; width: 12px; border:0;">
                                </td>
                                <td style="padding-left: 8px; color: #00E5FF; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap;"><a href="tel:0661747573" style="color: #00E5FF; text-decoration: none;">06 61 74 75 73</a></td>
                                
                                <td style="padding: 0 15px; color: rgba(255,255,255,0.1);">|</td>
                                
                                <td style="vertical-align: middle;">
                                    <img src="https://img.icons8.com/ios-filled/50/EEF1F7/new-post.png" width="12" style="display: block; width: 12px; border:0;">
                                </td>
                                <td style="padding-left: 8px; color: #EEF1F7; font-size: 13px; opacity: 0.8; letter-spacing: 0.5px;"><a href="mailto:julien.florence@gmail.com" style="color: #EEF1F7; text-decoration: none;">julien.florence@gmail.com</a></td>
                            </tr>
                        </table>

                        <!-- CTA -->
                        <div style="margin-top: 25px;">
                            <a href="https://calendar.app.google/iCzfE1GQrjxM3ZQ56" target="_blank" style="display: inline-block; background: linear-gradient(90deg, #00E5FF, #7B5CFF); color: #05070D; padding: 12px 28px; text-decoration: none; font-size: 12px; font-weight: 800; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; font-family: 'Bricolage Grotesque', sans-serif;">Prendre RDV</a>
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>`;

    document.getElementById('signature-container').innerHTML = signatureHTML;

    function copySignature() {
        const container = document.getElementById('signature-container');
        const range = document.createRange();
        range.selectNode(container);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            const s = document.getElementById('status');
            s.innerText = "✓ SIGNATURE QUESTIA COPIÉE";
            setTimeout(() => s.innerText = "", 4000);
        } catch (err) {
            alert("Erreur lors de la copie.");
        }
        window.getSelection().removeAllRanges();
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Prestige - Happy House</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600;800&display=swap');

        body { margin: 0; padding: 0; background-color: #f4f4f4; -webkit-text-size-adjust: 100%; }
        
        .email-container {
            width: 100% !important;
            max-width: 600px !important;
            margin: 0 auto !important;
            background-color: #ffffff;
            border-collapse: collapse;
        }

        .header-image {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            display: block !important;
            border: 0;
        }

        .content-area {
            padding: 30px !important;
            font-family: 'Montserrat', Helvetica, Arial, sans-serif !important;
            font-size: 16px !important;
            line-height: 1.6 !important;
            color: #0B132B !important;
        }

        .cta-footer {
            background-color: #0B132B !important;
            padding: 40px 20px !important;
            text-align: center !important;
            border-top: 3px solid #D4AF37 !important;
        }

        .percutant-btn {
            display: inline-block !important;
            border: 2px solid #D4AF37 !important;
            color: #D4AF37 !important;
            padding: 12px 20px !important;
            text-decoration: none !important;
            font-family: 'Cinzel', serif !important;
            font-size: 12px !important;
            font-weight: 700 !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            margin: 10px 5px !important;
            min-width: 200px !important;
        }

        .identity-block {
            padding-top: 25px !important;
            margin-top: 20px !important;
            border-top: 1px solid rgba(212, 175, 55, 0.2) !important;
            color: #ffffff !important;
            font-family: 'Montserrat', sans-serif !important;
            font-size: 14px;
        }

        .name-gold {
            font-family: 'Cinzel', serif !important;
            color: #D4AF37 !important;
            font-size: 18px !important;
            font-weight: 700 !important;
            display: block !important;
            margin-top: 5px !important;
        }

        @media only screen and (max-width: 600px) {
            .percutant-btn { display: block !important; margin: 10px auto !important; width: 90% !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">

    <div class="email-container">
        <!-- En-tête avec Image Pleine Largeur -->
        <div style="background-color: #0B132B; width: 100%;">
            <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1200&auto=format&fit=crop" alt="Esprit Happy House" class="header-image" style="width: 100%; height: auto; display: block;">
            <div style="border-bottom: 2px solid #D4AF37; padding: 25px 20px; text-align: center;">
                <h1 style="font-family: 'Cinzel', serif; color: #D4AF37; font-size: 18px; margin: 0; letter-spacing: 1px; text-transform: uppercase;">
                    Waouh !<br>
                    <span style="font-size: 13px; font-family: 'Montserrat', sans-serif; font-style: italic; color: #ffffff; text-transform: none; font-weight: 400;">Rien ne résume mieux la première impression d’un client qui découvre l’esprit d’un lieu Happy House !</span>
                </h1>
            </div>
        </div>

        <!-- Zone de Texte -->
        <div class="content-area">
            <div style="min-height: 200px;">&nbsp;</div>
        </div>

        <!-- Bas de page -->
        <div class="cta-footer">
            <div style="margin-bottom: 20px;">
                <a href="https://calendar.app.google/njCoVGmaFse1G7FX7" class="percutant-btn">📅 Prendre Rendez-vous</a>
                <a href="https://my-happyhouse.com/" class="percutant-btn">🌐 Explorer nos lieux</a>
            </div>

            <div class="identity-block">
                Directeur du développement commercial<br>
                <span class="name-gold">Julien | 06 61 74 75 73</span>
            </div>
        </div>
    </div>

</body>
</html>
